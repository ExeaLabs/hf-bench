model: tabnet
max_epochs: 200
patience: 15
batch_size: 16384

hyperparameter_search:
  n_d:
    type: int
    low: 8
    high: 64
  n_a:
    type: int
    low: 8
    high: 64
  n_steps:
    type: int
    low: 3
    high: 10
  gamma:
    type: float
    low: 1.0
    high: 2.0
  lambda_sparse:
    type: float
    low: 1.0e-6
    high: 1.0e-3
    log: true
  lr:
    type: float
    low: 1.0e-3
    high: 2.0e-2
    log: true
  batch_size:
    type: categorical
    choices: [4096, 16384, 32768, 65536]
