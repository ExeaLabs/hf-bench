model: ft_transformer
max_epochs: 200
early_stopping_patience: 15

hyperparameter_search:
  d_token:
    type: categorical
    choices: [64, 128, 192, 256]
  n_layers:
    type: int
    low: 1
    high: 4
  n_heads:
    type: categorical
    choices: [4, 8]
  dropout:
    type: float
    low: 0.0
    high: 0.4
  lr:
    type: float
    low: 1.0e-4
    high: 1.0e-3
    log: true
  weight_decay:
    type: float
    low: 1.0e-6
    high: 1.0e-2
    log: true
  batch_size:
    type: categorical
    choices: [128, 256, 512]
