model: xgboost
eval_metric: logloss
n_jobs: -1

hyperparameter_search:
  max_depth:
    type: int
    low: 3
    high: 10
  learning_rate:
    type: float
    low: 0.005
    high: 0.3
    log: true
  n_estimators:
    type: int
    low: 100
    high: 1000
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  reg_alpha:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  reg_lambda:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  min_child_weight:
    type: int
    low: 1
    high: 20
