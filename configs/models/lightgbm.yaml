model: lightgbm
n_jobs: -1
verbose: -1

hyperparameter_search:
  num_leaves:
    type: int
    low: 20
    high: 300
  max_depth:
    type: int
    low: 3
    high: 12
  learning_rate:
    type: float
    low: 0.005
    high: 0.3
    log: true
  n_estimators:
    type: int
    low: 100
    high: 1000
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  reg_alpha:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  reg_lambda:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  min_child_samples:
    type: int
    low: 5
    high: 100
